<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishii Birthday Countdown 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
 margin:0;
 font-family:'Poppins',sans-serif;
 background:linear-gradient(135deg,#ffc1da,#ffd9ec,#ffe6f3);
 height:100vh;
 display:flex;
 align-items:center;
 justify-content:center;
 overflow:hidden;
}

/* floating hearts */
.heart{
 position:absolute;
 color:#ff6fa5;
 font-size:20px;
 animation:float 8s linear infinite;
 opacity:.7;
}
@keyframes float{
 0%{transform:translateY(100vh) scale(.5);opacity:0}
 50%{opacity:1}
 100%{transform:translateY(-10vh) scale(1.2);opacity:0}
}

.container{
 text-align:center;
 background:rgba(255,255,255,0.85);
 backdrop-filter:blur(10px);
 padding:50px 40px;
 border-radius:25px;
 box-shadow:0 15px 40px rgba(0,0,0,0.15);
 max-width:520px;
}

h1{
 font-family:'Pacifico',cursive;
 color:#ff4d94;
 font-size:36px;
 margin-bottom:10px;
}

.subtitle{
 color:#ff6fa5;
 margin-bottom:25px;
}

#timer{
 font-size:32px;
 font-weight:600;
 color:#ff4d94;
 margin:25px 0;
}

button{
 background:linear-gradient(135deg,#ff69b4,#ff4d94);
 border:none;
 color:white;
 padding:15px 28px;
 font-size:18px;
 border-radius:40px;
 cursor:pointer;
 transition:.3s;
 box-shadow:0 8px 20px rgba(255,77,148,0.4);
}

button:hover{transform:scale(1.05)}

button:disabled{
 background:#d9d9d9;
 box-shadow:none;
 cursor:not-allowed;
}

#message{
 margin-top:30px;
 font-size:24px;
 color:#ff1493;
 font-weight:500;
}

.confetti{
 position:fixed;
 width:8px;
 height:8px;
 background:red;
 top:-10px;
 animation:fall 3s linear forwards;
}

@keyframes fall{
 to{transform:translateY(110vh) rotate(720deg)}
}

.footer{
 margin-top:25px;
 font-size:13px;
 color:#999;
}
</style>
</head>
<body>

<div class="container">

<h1>Ishii's Birthday 🎀</h1>
<div class="subtitle">A special surprise is waiting...</div>

<div id="timer"></div>

<button id="giftBtn" disabled>🎁 Open Surprise Gift</button>

<div id="message"></div>

<div class="footer">Made with 💖 just for Ishii</div>

</div>

<script>

/* floating hearts generator */
setInterval(()=>{
 const heart=document.createElement("div")
 heart.className="heart"
 heart.innerHTML="💗"
 heart.style.left=Math.random()*100+"vw"
 heart.style.fontSize=(16+Math.random()*20)+"px"
 document.body.appendChild(heart)
 setTimeout(()=>heart.remove(),8000)
},500)


const birthday=new Date("March 22, 2026 00:00:00").getTime()
const btn=document.getElementById("giftBtn")
const message=document.getElementById("message")

const timer=setInterval(()=>{

 const now=new Date().getTime()
 const distance=birthday-now

 const days=Math.floor(distance/(1000*60*60*24))
 const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60))
 const minutes=Math.floor((distance%(1000*60*60))/(1000*60))
 const seconds=Math.floor((distance%(1000*60))/1000)

 document.getElementById("timer").innerHTML=
 `${days}d ${hours}h ${minutes}m ${seconds}s`

 if(distance<0){
 clearInterval(timer)
 document.getElementById("timer").innerHTML="🎉 It's Ishii's Birthday!"
 btn.disabled=false
 }

},1000)

btn.onclick=()=>{

 message.innerHTML="🎂 Happy Birthday Ishii! 💖 May your day be filled with love, smiles, and beautiful memories!"

 for(let i=0;i<120;i++){
  const conf=document.createElement("div")
  conf.className="confetti"
  conf.style.left=Math.random()*100+"vw"
  conf.style.background=`hsl(${Math.random()*360},70%,60%)`
  conf.style.animationDuration=(2+Math.random()*2)+"s"
  document.body.appendChild(conf)
  setTimeout(()=>conf.remove(),3000)
 }

}

</script>

</body>
</html>
